[alembic]
script_location = alembic

# sqlalchemy.url is read from the env var at runtime by our env.py.
# Keep a placeholder here.
sqlalchemy.url = postgresql+psycopg2://postgres:postgres123@localhost:5432/inventarioszonas

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = INFO
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[post_write_hooks]
# empty

